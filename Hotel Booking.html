<html lang="en">

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --header-bg: #ffffff;
            --header-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);

            --card-bg: #ffffff;
            --card-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
            --text-primary: #333333;
            --text-muted: #666666;
            --input-bg: #ffffff;
            --input-border: #dddddd;
            --chip-bg: #f0f0f0;
            --btn-primary: #667eea;
            --btn-primary-hover: #764ba2;
            --logo-color: #2405d1;
            --surface-border: #e5e7eb;
            --accent-soft: rgba(102, 126, 234, 0.12);
            --alert-bg: #d4edda;
            --alert-text: #155724;
            --alert-border: #c3e6cb;
            --modal-overlay: rgba(0, 0, 0, 0.55);
            --modal-bg: #ffffff;
            --modal-shadow: 0 16px 40px rgba(0, 0, 0, 0.3);
        }

        body.dark {
            --bg-gradient: linear-gradient(135deg, #101827 0%, #1f2937 100%);
            --header-bg: #1f2937;
            --header-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
            --surface-bg: rgba(31, 41, 55, 0.95);
            --card-bg: #1f2937;
            --card-shadow: 0 8px 24px rgba(0, 0, 0, 0.35);
            --text-primary: #f3f4f6;
            --text-muted: #cbd5e1;
            --input-bg: #111827;
            --input-border: #374151;
            --chip-bg: #374151;
            --btn-primary: #4f46e5;
            --btn-primary-hover: #4338ca;
            --logo-color: #c7d2fe;
            --surface-border: #374151;
            --accent-soft: rgba(129, 140, 248, 0.2);
            --alert-bg: #14532d;
            --alert-text: #dcfce7;
            --alert-border: #166534;
            --modal-overlay: rgba(0, 0, 0, 0.7);
            --modal-bg: #1f2937;
            --modal-shadow: 0 16px 40px rgba(0, 0, 0, 0.55);
        }

        body {
            font-family: 'Nunito', 'Quicksand', sans-serif;
            font-weight: 400;
            line-height: 1.6;
            letter-spacing: 0.1px;
            background: var(--bg-gradient);
            color: var(--text-primary);
            min-height: 100vh;
            padding: 16px;
            margin: 0;
            transition: background 0.25s ease, color 0.25s ease;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            background: var(--header-bg);
            padding: 16px 18px;
            border-radius: 14px;
            box-shadow: var(--header-shadow);
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 14px;
            border: 1px solid var(--surface-border);
            transition: background 0.25s ease, box-shadow 0.25s ease;
        }

        .header-actions {
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
        }

        .logo {
            font-size: 22px;
            font-weight: 700;
            color: var(--logo-color);
            letter-spacing: 0.2px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo-icon {
            width: 50px;
            height: 50px;
            object-fit: contain;
        }

        .back-btn,
        .my-bookings-btn,
        .theme-btn {
            padding: 10px 14px;
            background: var(--btn-primary);
            color: #ffffff;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            transition: background 0.2s ease, transform 0.2s ease, box-shadow 0.2s ease;
        }

        .back-btn:hover,
        .my-bookings-btn:hover,
        .theme-btn:hover {
            background: var(--btn-primary-hover);
            transform: translateY(-1px);
            box-shadow: 0 8px 18px rgba(102, 126, 234, 0.3);
        }

        .search-container {
            background: var(--surface-bg);
            padding: 22px;
            border-radius: 14px;
            border: 1px solid var(--surface-border);
            box-shadow: var(--card-shadow);
            margin-bottom: 22px;
            transition: background 0.25s ease;
        }

        .search-container h2 {
            margin-bottom: 16px;
            font-size: 1.5rem;
        }

        .search-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 14px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        label {
            margin-bottom: 6px;
            font-weight: 600;
            color: var(--text-primary);
            font-size: 0.92rem;
        }

        select,
        input {
            padding: 11px 12px;
            border: 1px solid var(--input-border);
            border-radius: 8px;
            outline: none;
            background: var(--input-bg);
            color: var(--text-primary);
            transition: border-color 0.2s ease, box-shadow 0.2s ease;
        }

        select:focus,
        input:focus {
            border-color: var(--btn-primary);
            box-shadow: 0 0 0 3px var(--accent-soft);
        }

        input::placeholder,
        select::placeholder,
        textarea::placeholder {
            color: var(--text-muted);
            opacity: 0.9;
        }

        body.dark input,
        body.dark select,
        body.dark textarea {
            color-scheme: dark;
        }

        .search-btn {
            grid-column: 1 / -1;
            padding: 13px 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: 700;
            cursor: pointer;
            transition: background 0.2s ease, transform 0.2s ease;
        }

        .search-btn:hover {
            background: var(--btn-primary-hover);
            transform: translateY(-1px);
        }

        .hotel-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(310px, 1fr));
            gap: 18px;
            margin-top: 18px;
        }

        .hotel-card {
            background: var(--card-bg);
            border-radius: 14px;
            overflow: hidden;
            box-shadow: var(--card-shadow);
            border: 1px solid var(--surface-border);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .hotel-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 24px rgba(0, 0, 0, 0.18);
        }

        .hotel-img {
            height: 200px;
            background: #e5e7eb;
            overflow: hidden;
        }

        .hotel-img img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .hotel-info {
            padding: 16px;
        }

        .hotel-name {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 5px;
            color: var(--text-primary);
        }

        .rating {
            color: #fdbb2d;
            margin-bottom: 10px;
        }

        .price-tag {
            font-size: 21px;
            color: #b21f1f;
            font-weight: 700;
        }

        .amenities {
            display: flex;
            gap: 8px;
            margin: 12px 0;
            font-size: 12px;
            color: var(--text-muted);
            flex-wrap: wrap;
        }

        .book-now {
            width: 100%;
            padding: 10px 12px;
            background: #28a745;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 700;
            transition: background 0.2s ease, transform 0.2s ease;
        }

        .book-now:hover {
            background: #218838;
            transform: translateY(-1px);
        }

        .alert {
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
            text-align: center;
            background: var(--alert-bg);
            color: var(--alert-text);
            border: 1px solid var(--alert-border);
        }

        .upi-modal {
            position: fixed;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background: var(--modal-overlay);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .upi-modal-content {
            background: var(--modal-bg);
            color: var(--text-primary);
            border-radius: 12px;
            padding: 24px;
            max-width: 400px;
            width: 90%;
            text-align: center;
            box-shadow: var(--modal-shadow);
        }

        .upi-modal-content h3 {
            margin-bottom: 15px;
        }

        .upi-modal-content img {
            max-width: 220px;
            margin-bottom: 16px;
        }

        .upi-close {
            margin-top: 12px;
            background: #dc3545;
            color: white;
            border: none;
            border-radius: 6px;
            padding: 8px 14px;
            cursor: pointer;
        }

        .empty-message {
            color: var(--text-primary);
            grid-column: 1 / -1;
            text-align: center;
            padding: 18px;
            background: var(--surface-bg);
            border: 1px dashed var(--surface-border);
            border-radius: 12px;
        }

        @media (max-width: 900px) {
            body {
                padding: 12px;
            }

            header {
                flex-direction: column;
                align-items: flex-start;
                gap: 12px;
            }

            .header-actions {
                width: 100%;
            }

            .back-btn,
            .my-bookings-btn,
            .theme-btn {
                flex: 1 1 180px;
            }

            .search-container {
                padding: 16px;
            }
        }

        @media (max-width: 640px) {
            .logo {
                font-size: 18px;
                gap: 8px;
            }

            .logo-icon {
                width: 40px;
                height: 40px;
            }

            .search-grid {
                grid-template-columns: 1fr;
            }

            .hotel-grid {
                grid-template-columns: 1fr;
            }

            .header-actions {
                display: grid;
                grid-template-columns: 1fr;
                width: 100%;
            }

            .hotel-info {
                padding: 14px;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <div class="logo">
            <img src="./images/hotel-logo.svg" alt="Hotel Logo" class="logo-icon">
            <span>Travelator Hotels India</span>
        </div>
            <div class="header-actions">
                <button class="back-btn" onclick="goBackToDashboard()">Back to Dashboard</button>
                <button class="my-bookings-btn" onclick="viewMyBookings()">My Bookings</button>
                    <button id="themeToggle" class="theme-btn" onclick="toggleTheme()">Dark</button>
            </div>
    </header>

    <div id="alert" class="alert"></div>

    <div id="upiModal" class="upi-modal" onclick="closeUpiModal(event)">
        <div class="upi-modal-content" onclick="event.stopPropagation()">
            <h3>Pay using UPI</h3>
            <img id="upiQrImage" src="" alt="UPI QR Code" />
            <p id="upiInstruction">Scan the QR code or pay to <strong>8850989807@fam</strong></p>
            <p id="upiAmountDisplay"></p>
            <div style="margin-top: 12px; display: flex; justify-content: center; gap: 10px; flex-wrap: wrap;">

                <button class="upi-close" style="background:#17a2b8;" onclick="confirmUpiPayment()">I’ve Paid</button>
                <button class="upi-close" style="background:#dc3545;" onclick="closeUpiModal()">Close</button>
            </div>
            <p id="upiFeedback" style="margin-top:8px; font-size:0.9rem; color:#1a7f00; display:none"></p>
        </div>
    </div>

    <div class="search-container">
        <h2>Find the Perfect Stay</h2>
        <div class="search-grid">
            <div class="form-group">
                <label>City</label>
                <select id="citySelect">
                    <option value="all">All Cities</option>
                </select>
            </div>
            <div class="form-group">
                <label>Check-in</label>
                <input type="date" id="checkin">
            </div>
            <div class="form-group">
                <label>Check-out</label>
                <input type="date" id="checkout">
            </div>
            <div class="form-group">
                <label>Room Type</label>
                <select id="roomType">
                    <option value="Deluxe">Deluxe Room</option>
                    <option value="Luxury">Luxury Suite</option>
                    <option value="Presidential">Presidential Suite</option>
                </select>
            </div>
            <button class="search-btn" onclick="searchHotels()">Search Available Hotels</button>
        </div>
    </div>

    <div class="hotel-grid" id="hotelResults">
        </div>
</div>

    function populateCityOptions() {
        const citySelect = document.getElementById('citySelect');
        const uniqueCities = [...new Set(hotelDB.map(h => h.city))].sort();
        uniqueCities.forEach(city => {
            const option = document.createElement('option');
            option.value = city;
            option.textContent = city;
            citySelect.appendChild(option);
        });
    }

    function searchHotels() {
        const city = document.getElementById('citySelect').value;
        const results = city === 'all' ? hotelDB : hotelDB.filter(h => h.city === city);
        displayHotels(results);
    }

    function initializeDates() {
        const checkinInput = document.getElementById('checkin');
        const checkoutInput = document.getElementById('checkout');
        const today = new Date();
        const tomorrow = new Date(today);
        tomorrow.setDate(today.getDate() + 1);

        const formatDate = (date) => date.toISOString().split('T')[0];
        const todayStr = formatDate(today);
        const tomorrowStr = formatDate(tomorrow);

        checkinInput.min = todayStr;
        checkoutInput.min = tomorrowStr;

        if (!checkinInput.value) checkinInput.value = todayStr;
        if (!checkoutInput.value) checkoutInput.value = tomorrowStr;

        checkinInput.addEventListener('change', () => {
            const selectedCheckin = checkinInput.value;
            if (!selectedCheckin) return;
            const nextDay = new Date(selectedCheckin);
            nextDay.setDate(nextDay.getDate() + 1);
            const minCheckout = formatDate(nextDay);
            checkoutInput.min = minCheckout;
            if (!checkoutInput.value || checkoutInput.value < minCheckout) {
                checkoutInput.value = minCheckout;
            }
        });
    }

    function displayHotels(hotels) {
        const grid = document.getElementById('hotelResults');
        grid.innerHTML = '';

        if(hotels.length === 0) {
            grid.innerHTML = '<div class="empty-message">No hotels found for this city.</div>';
            return;
        }

        hotels.forEach(h => {
            const card = document.createElement('div');
            card.className = 'hotel-card';
            card.innerHTML = `
                <div class="hotel-img">
                    <img src="${h.image}" alt="${h.name}" loading="lazy" onerror="this.onerror=null;this.src='https://images.unsplash.com/photo-1578683010236-d716f9a3f461?auto=format&fit=crop&w=1200&q=80';" />
                </div>
                <div class="hotel-info">
                    <div class="hotel-name">${h.name}</div>
                    <div class="rating">${'★'.repeat(h.rating)}</div>
                    <p style="font-size: 14px; color: var(--text-muted); margin-bottom: 10px;">${h.desc}</p>
                    <div class="amenities">
                        ${h.amenities.map(a => `<span style="background: var(--chip-bg); padding: 2px 8px; border-radius: 10px;">${a}</span>`).join('')}
                    </div>
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 15px;">
                        <div class="price-tag">₹${HOTEL_BOOKING_PRICE.toLocaleString()}<span style="font-size: 12px; color: var(--text-muted);">/night</span></div>
                        <button class="book-now" onclick="confirmBooking('${h.name}')">Book Now</button>
                    </div>
                </div>
            `;
            grid.appendChild(card);
        });
    }

    function confirmBooking(name) {
        // Find hotel details if available
        const hotel = hotelDB.find(h => h.name === name) || { name };
        const checkin = document.getElementById('checkin') ? document.getElementById('checkin').value : '';
        const checkout = document.getElementById('checkout') ? document.getElementById('checkout').value : '';

        // Create booking object and persist to localStorage
        const booking = {
            id: Date.now(),
            name: hotel.name,
            city: hotel.city || '',
            price: HOTEL_BOOKING_PRICE,
            image: hotel.image || '',
            checkin,
            checkout,
            bookedAt: new Date().toISOString(),
            paymentStatus: 'pending',
            receiptNumber: null
        };

    const existing = JSON.parse(localStorage.getItem('hotelBookings') || '[]');
    existing.push(booking);
    localStorage.setItem('hotelBookings', JSON.stringify(existing));
    window.currentPendingPayment = { type: 'hotel', id: booking.id };

    // Sync with backend
    syncBookingToBackend('hotel', booking);

    // Update global stats
    const gsRaw = localStorage.getItem('globalStats');
    const gs = gsRaw ? JSON.parse(gsRaw) : { hotels: 0, flights: 0, rewards: 0 };
    gs.hotels = (gs.hotels || 0) + 1;
    // Reward points: simple rule 1 point per ₹100
    gs.rewards = (gs.rewards || 0) + Math.round(HOTEL_BOOKING_PRICE / 100);
    localStorage.setItem('globalStats', JSON.stringify(gs));

    // Show confirmation to the user
    const alertBox = document.getElementById('alert');
    alertBox.textContent = `Room at ${name} is reserved. Please complete QR payment to confirm booking.`;
    alertBox.style.display = 'block';
    window.scrollTo({top: 0, behavior: 'smooth'});
    setTimeout(() => { alertBox.style.display = 'none'; }, 5000);

    // Show UPI QR prompt for payment (custom UPI ID)
    showUpiQrModal(HOTEL_BOOKING_PRICE);
    }

    function getUpiQrUrl(amount) {
        const upiId = '8850989807@fam';
        const payeeName = 'TravelatorBooking';
        const qrText = `upi://pay?pa=${encodeURIComponent(upiId)}&pn=${encodeURIComponent(payeeName)}&am=${encodeURIComponent(amount)}&cu=INR`;
        return `https://api.qrserver.com/v1/create-qr-code/?size=280x280&data=${encodeURIComponent(qrText)}`;
    }

    function showUpiQrModal(amount) {
        const modal = document.getElementById('upiModal');
        const qrImage = document.getElementById('upiQrImage');
        const amountDisplay = document.getElementById('upiAmountDisplay');
        const instruction = document.getElementById('upiInstruction');

        const qrUrl = getUpiQrUrl(amount);
        qrImage.src = qrUrl;
        amountDisplay.innerHTML = `<strong>Amount: ₹${parseFloat(amount).toFixed(2)}</strong>`;
        instruction.innerHTML = `Scan with UPI app and pay to <strong>8850989807@fam</strong>`;

        modal.style.display = 'flex';
    }

    function closeUpiModal(event) {
        if (event && event.target && event.target.id !== 'upiModal') return;
        const modal = document.getElementById('upiModal');
        modal.style.display = 'none';
    }

    function copyUpiLink() {
        const upiId = '8850989807@fam';
        const amountText = document.getElementById('upiAmountDisplay').textContent.replace('Amount: ₹', '').trim();
        const link = `upi://pay?pa=${encodeURIComponent(upiId)}&pn=${encodeURIComponent('TravelatorBooking')}&am=${encodeURIComponent(amountText)}&cu=INR`;
        navigator.clipboard.writeText(link).then(() => {
            const feedback = document.getElementById('upiFeedback');
            feedback.textContent = 'UPI payment link copied to clipboard! Paste it in your UPI app.';
            feedback.style.display = 'block';
            setTimeout(() => { feedback.style.display = 'none'; }, 3000);
        }).catch(err => {
            console.error('Clipboard copy failed', err);
            alert('Copy failed. Please copy manually: ' + link);
        });
    }

    async function confirmUpiPayment() {
        const modal = document.getElementById('upiModal');
        modal.style.display = 'none';

        const alertBox = document.getElementById('alert');
        const receipt = prompt('Enter payment receipt number (required for backend verification)');
        if (!receipt || !receipt.trim()) {
            alert('Receipt number is required for verification.');
            return;
        }

        if (window.currentPendingPayment && window.currentPendingPayment.type === 'hotel') {
            const hotels = JSON.parse(localStorage.getItem('hotelBookings') || '[]');
            const booking = hotels.find(b => b.id === window.currentPendingPayment.id);
            const amount = booking ? booking.price : 0;

            try {
                const verifyResp = await verifyBookingBackend('hotel', window.currentPendingPayment.id, receipt.trim(), amount);
                if (verifyResp && verifyResp.booking) {
                    booking.paymentStatus = 'paid';
                    booking.receiptNumber = verifyResp.booking.receiptNumber;
                    localStorage.setItem('hotelBookings', JSON.stringify(hotels));
                    alertBox.textContent = 'Payment verified. Your hotel booking is now confirmed.';
                } else {
                    alertBox.textContent = 'Payment verification failed on backend. Please retry.';
                }
            } catch (err) {
                console.error('Backend payment verify failed', err);
                alertBox.textContent = 'Backend verification failed, saving local paid status and confirming booking.';
                if (booking) {
                    booking.paymentStatus = 'paid';
                    booking.receiptNumber = receipt.trim();
                    localStorage.setItem('hotelBookings', JSON.stringify(hotels));
                }
            }

            if (booking) {
                alert(`Booking confirmed!\nHotel: ${booking.name}\nPrice: ₹${booking.price || 0}`);
            }

            alertBox.style.background = '#d4edda';
            alertBox.style.color = '#155724';
            alertBox.style.border = '1px solid #c3e6cb';
            alertBox.style.display = 'block';
            setTimeout(() => { alertBox.style.display = 'none'; }, 5000);

            if (document.querySelector('#hotelResults .hotel-card')) {
                viewMyBookings();
            }
        }
    }

    async function syncBookingToBackend(type, booking) {
        try {
            const res = await fetch('http://localhost:3000/api/bookings', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ type, booking })
            });
            return await res.json();
        } catch (error) {
            console.warn('Backend sync error', error);
        }
    }

    async function verifyBookingBackend(type, id, receiptNumber, amount) {
        const res = await fetch(`http://localhost:3000/api/bookings/${type}/${id}/verify`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ receiptNumber, amount })
        });
        if (!res.ok) throw new Error('Verification failed');
        return await res.json();
    }

    // Show user's bookings stored in localStorage
    function viewMyBookings() {
        const bookings = JSON.parse(localStorage.getItem('hotelBookings') || '[]');
        const grid = document.getElementById('hotelResults');
        grid.innerHTML = '';

        if (!bookings.length) {
            grid.innerHTML = '<div class="empty-message">You have no bookings yet.</div>';
            return;
        }

        // Render each booking as a card
        bookings.reverse().forEach(b => {
            const card = document.createElement('div');
            card.className = 'hotel-card';
            const statusColor = b.paymentStatus === 'paid' ? '#28a745' : b.paymentStatus === 'cancelled' ? '#dc3545' : '#ffc107';
            const statusText = b.paymentStatus ? b.paymentStatus.toUpperCase() : 'PENDING';
            const receiptInfo = b.receiptNumber ? `<p style="font-size:12px; color:var(--text-muted);">Receipt: ${b.receiptNumber}</p>` : '';
            const matchedHotel = hotelDB.find(h => h.name === b.name);
            const bookingImage = b.image || (matchedHotel && matchedHotel.image) || 'https://images.unsplash.com/photo-1578683010236-d716f9a3f461?auto=format&fit=crop&w=1200&q=80';

            card.innerHTML = `
                <div class="hotel-img">
                    <img src="${bookingImage}" alt="${b.name}" loading="lazy" onerror="this.onerror=null;this.src='https://images.unsplash.com/photo-1578683010236-d716f9a3f461?auto=format&fit=crop&w=1200&q=80';" />
                </div>
                <div class="hotel-info">
                    <div class="hotel-name">${b.name}</div>
                    <div style="color:var(--text-muted); margin:6px 0;">${b.city}</div>
                    <div class="price-tag">${b.price ? '₹' + b.price.toLocaleString() : 'Price N/A'}</div>
                    <p style="font-size:13px; color:var(--text-muted); margin:8px 0;">Check-in: ${b.checkin || '—'} | Check-out: ${b.checkout || '—'}</p>
                    <p style="font-size:12px; color:${statusColor}; font-weight:bold;">Status: ${statusText}</p>
                    ${receiptInfo}
                    <p style="font-size:12px; color:var(--text-muted);">Booked on: ${new Date(b.bookedAt).toLocaleString()}</p>
                    <div style="margin-top:12px; display:flex; gap:10px; flex-wrap: wrap;">
                        <button class="book-now" onclick="viewHotelDetails(${b.id})">Details</button>
                        ${b.paymentStatus !== 'paid' && b.paymentStatus !== 'cancelled' ? `<button style="background:#28a745; color:#fff; border:none; padding:8px 12px; border-radius:6px; cursor:pointer;" onclick="payNowHotel(${b.id})">Pay Now</button>` : ''}
                        ${b.paymentStatus !== 'paid' ? `<button style="background:#17a2b8; color:#fff; border:none; padding:8px 12px; border-radius:6px; cursor:pointer;" onclick="markHotelPaid(${b.id})">Mark as Paid</button>` : ''}
                        <button style="background:#dc3545; color:#fff; border:none; padding:8px 12px; border-radius:6px; cursor:pointer;" onclick="cancelBooking(${b.id})">Cancel Booking</button>
                    </div>
                </div>
            `;
            grid.appendChild(card);
        });

        // Scroll to the bookings area
        window.scrollTo({ top: grid.offsetTop - 20, behavior: 'smooth' });
    }

    function payNowHotel(id) {
        const bookings = JSON.parse(localStorage.getItem('hotelBookings') || '[]');
        const booking = bookings.find(b => b.id === id);
        if (!booking) {
            alert('Booking not found');
            return;
        }
        if (booking.paymentStatus === 'cancelled') {
            alert('This booking has been cancelled and cannot be paid.');
            return;
        }
        window.currentPendingPayment = { type: 'hotel', id: booking.id };
        showUpiQrModal(booking.price || 0);
    }

    function markHotelPaid(id) {
        const bookings = JSON.parse(localStorage.getItem('hotelBookings') || '[]');
        const booking = bookings.find(b => b.id === id);
        if (!booking) {
            alert('Booking not found');
            return;
        }
        booking.paymentStatus = 'paid';
        if (!booking.receiptNumber) booking.receiptNumber = 'R-' + Date.now();
        localStorage.setItem('hotelBookings', JSON.stringify(bookings));
        syncBookingToBackend('hotel', booking);
        viewMyBookings();
        const alertBox = document.getElementById('alert');
        alertBox.textContent = 'Booking marked as paid with receipt ' + booking.receiptNumber;
        alertBox.style.display = 'block';
        setTimeout(() => { alertBox.style.display = 'none'; }, 4000);
    }

    // Cancel a booking by id
    function cancelBooking(id) {
        if (!confirm('Are you sure you want to cancel this booking?')) return;
        let bookings = JSON.parse(localStorage.getItem('hotelBookings') || '[]');
        const booking = bookings.find(b => b.id === id);
        if (!booking) {
            alert('Booking not found');
            return;
        }
        booking.paymentStatus = 'cancelled';
        localStorage.setItem('hotelBookings', JSON.stringify(bookings));
        syncBookingToBackend('hotel', booking);

        // Show feedback
        const alertBox = document.getElementById('alert');
        alertBox.textContent = 'Booking cancelled successfully.';
        alertBox.style.display = 'block';
        setTimeout(() => { alertBox.style.display = 'none'; }, 3000);

        // Refresh view
        viewMyBookings();
    }

    // Optional: show details (placeholder)
    function viewHotelDetails(id) {
        const bookings = JSON.parse(localStorage.getItem('hotelBookings') || '[]');
        const b = bookings.find(x => x.id === id);
        if (b) {
            alert(`Booking details:\nHotel: ${b.name}\nCity: ${b.city}\nCheck-in: ${b.checkin || '—'}\nCheck-out: ${b.checkout || '—'}\nBooked on: ${new Date(b.bookedAt).toLocaleString()}`);
        } else {
            alert('Booking not found');
        }
    }

    function goBackToDashboard() {
            window.location.href = 'dashboard.html';
    }
        function toggleTheme() {
            const body = document.body;
            const toggleBtn = document.getElementById('themeToggle');
            body.classList.toggle('dark');
            if (body.classList.contains('dark')) {
                toggleBtn.textContent = 'Light';
            } else {
                toggleBtn.textContent = 'Dark';
            }
            localStorage.setItem('theme', body.classList.contains('dark') ? 'dark' : 'light');
        }

    // Load all on start
    window.onload = () => {
        const savedTheme = localStorage.getItem('theme');
        if (savedTheme === 'dark') {
            document.body.classList.add('dark');
            document.getElementById('themeToggle').textContent = 'Light';
        }
        populateCityOptions();
        initializeDates();
        displayHotels(hotelDB);
    };
</script>
