<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Travelator AI - Live Translator</title>
    <style>
        :root {
            --primary: #667eea;
            --secondary: #764ba2;
            --bg: #f0f2f5;
            --card-bg: white;
            --text-color: #333;
            --border-color: #ddd;
            --select-bg: #f8f9fa;
            --textarea-border: #e0e0e0;
        }

        body.dark {
            --bg: #0f172a;
            --card-bg: #1f2937;
            --text-color: #f3f4f6;
            --border-color: #374151;
            --select-bg: #1f2937;
            --textarea-border: #374151;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Inter', system-ui, sans-serif; 
            background: var(--bg); 
            display: flex; justify-content: center; align-items: center; min-height: 100vh;
            color: var(--text-color);
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        .translator-card {
            width: 95%; max-width: 900px; background: var(--card-bg);
            border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            overflow: hidden;
            transition: background-color 0.3s ease;
        }

        .header-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 20px;
        }

        .header-title {
            flex: 1;
        }

        .back-btn {
            padding: 10px 20px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            transition: background 0.2s ease;
        }

        .back-btn:hover {
            background: #764ba2;
        }

        .theme-toggle-btn {
            padding: 10px 16px;
            border: none;
            border-radius: 8px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #fff;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s ease, transform 0.2s ease;
        }

        .theme-toggle-btn:hover {
            transform: translateY(-1px);
        }

        .app-header {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white; padding: 25px; text-align: center;
        }

        .main-layout { padding: 30px; }

        .lang-selectors {
            display: flex; align-items: center; justify-content: space-between;
            margin-bottom: 20px; gap: 10px;
        }

        select {
            flex: 1; padding: 12px; border: 1px solid var(--border-color);
            border-radius: 8px; font-size: 1rem; cursor: pointer;
            background-color: var(--select-bg);
            color: var(--text-color);
            transition: background-color 0.3s ease, color 0.3s ease, border-color 0.3s ease;
        }

        .swap-icon {
            font-size: 1.5rem; cursor: pointer; color: var(--primary);
            transition: 0.3s; padding: 10px;
        }

        .swap-icon:hover { transform: rotate(180deg); }

        .text-areas {
            display: grid; grid-template-columns: 1fr 1fr; gap: 20px;
        }

        textarea {
            width: 100%; height: 200px; padding: 20px;
            border: 1px solid var(--textarea-border); border-radius: 12px;
            font-size: 1.1rem; resize: none; outline: none;
            line-height: 1.6;
            background-color: var(--select-bg);
            color: var(--text-color);
            transition: background-color 0.3s ease, color 0.3s ease, border-color 0.3s ease;
        }

        textarea:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1); }

        textarea[readonly] {
            opacity: 0.8;
        }

        .loader {
            height: 4px; width: 100%; background: var(--border-color);
            position: relative; overflow: hidden; display: none;
        }

        .loader::after {
            content: ''; position: absolute; left: -50%;
            height: 100%; width: 50%; background: var(--primary);
            animation: loading 1.5s infinite linear;
        }

        @keyframes loading {
            0% { left: -50%; } 100% { left: 100%; }
        }

        @media (max-width: 600px) {
            .text-areas { grid-template-columns: 1fr; }
            .header-container {
                flex-direction: column;
                align-items: stretch;
            }
        }
    </style>
</head>
<body>

    <div class="translator-card">
        <div class="app-header">
            <div class="header-container">
                <div class="header-title">
                    <h1>Travelator Translator</h1>
                    <p>Hindi • English • Spanish • French • German • Italian • Russian</p>
                </div>
                <div style="display: flex; gap: 10px; align-items: center; white-space: nowrap;">
                    <button class="theme-toggle-btn" onclick="toggleTheme()">🌙 Dark</button>
                    <button class="back-btn" onclick="goBackToDashboard()">← Dashboard</button>
                </div>
            </div>
        </div>
        
        <div class="loader" id="loader"></div>

        <div class="main-layout">
            <div class="lang-selectors">
                <select id="sourceLang">
                    <option value="hi" selected>Hindi (हिन्दी)</option>
                    <option value="en">English</option>
                    <option value="es">Spanish (Español)</option>
                    <option value="fr">French (Français)</option>
                    <option value="de">German (Deutsch)</option>
                    <option value="it">Italian (Italiano)</option>
                    <option value="ru">Russian (Русский)</option>
                </select>

                <div class="swap-icon" onclick="swapLanguages()">⇄</div>

                <select id="targetLang">
                    <option value="en" selected>English</option>
                    <option value="es">Spanish (Español)</option>
                    <option value="fr">French (Français)</option>
                    <option value="hi">Hindi (हिन्दी)</option>
                    <option value="de">German (Deutsch)</option>
                    <option value="it">Italian (Italiano)</option>
                    <option value="ru">Russian (Русский)</option>
                </select>
            </div>

            <div class="text-areas">
                <textarea id="sourceText" placeholder="Enter text here..."></textarea>
                <textarea id="targetText" placeholder="Translation..." readonly></textarea>
            </div>

            <div style="margin-top: 15px; display: flex; justify-content: center;">
                <button class="back-btn" style="background: #34a853;" onclick="performTranslation()">Translate Now</button>
            </div>
        </div>
    </div>

    <script src="js/translations.js"></script>
    <script>
        const sourceText = document.getElementById('sourceText');
        const targetText = document.getElementById('targetText');
        const sourceLang = document.getElementById('sourceLang');
        const targetLang = document.getElementById('targetLang');
        const loader = document.getElementById('loader');

        let debounceTimer;

        // Listen for typing with a debounce (waits for user to stop typing)
        sourceText.addEventListener('input', () => {
            clearTimeout(debounceTimer);
            debounceTimer = setTimeout(performTranslation, 800);
        });

        async function performTranslation() {
            const text = sourceText.value.trim();
            if (!text) {
                targetText.value = '';
                return;
            }

            loader.style.display = 'block';

            try {
                if (typeof translatorAPI !== 'undefined' && translatorAPI.translate) {
                    const translatedText = await translatorAPI.translate(text, sourceLang.value, targetLang.value);
                    targetText.value = translatedText || 'No translation returned.';
                    return;
                }

                targetText.value = 'Translator service is not available.';
            } catch (err) {
                console.warn('Translation failed.', err);
                targetText.value = 'Translation failed. Please check your API key/region and network.';
            } finally {
                loader.style.display = 'none';
            }
        }

        function swapLanguages() {
            const tempLang = sourceLang.value;
            sourceLang.value = targetLang.value;
            targetLang.value = tempLang;

            const tempText = sourceText.value;
            sourceText.value = targetText.value;
            targetText.value = tempText;

            performTranslation();
        }

        function goBackToDashboard() {
            window.location.href = 'dashboard.html';
        }

        function toggleTheme() {
            const body = document.body;
            const themeBtn = document.querySelector('.theme-toggle-btn');
            
            body.classList.toggle('dark');
            
            // Save preference
            localStorage.setItem('theme', body.classList.contains('dark') ? 'dark' : 'light');
            
            // Update button text
            themeBtn.textContent = body.classList.contains('dark') ? '☀️ Light' : '🌙 Dark';
        }

        // Load saved theme preference on page load
        window.addEventListener('DOMContentLoaded', () => {
            const savedTheme = localStorage.getItem('theme');
            const body = document.body;
            const themeBtn = document.querySelector('.theme-toggle-btn');
            
            if (savedTheme === 'dark') {
                body.classList.add('dark');
                themeBtn.textContent = '☀️ Light';
            }
        });
    </script>
</body>
</html>
