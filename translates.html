<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Travelator AI - Live Translator</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;600;700&family=Quicksand:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --surface-bg: #ffffff;
            --surface-muted: #f8f9fa;
            --text-primary: #333333;
            --text-muted: #666666;
            --border-color: #dddddd;
            --accent: #667eea;
            --accent-hover: #764ba2;
            --surface-border: #e5e7eb;
            --card-shadow: 0 5px 15px rgba(0,0,0,0.12);
        }

        body.dark {
            --bg-gradient: linear-gradient(135deg, #101827 0%, #1f2937 100%);
            --surface-bg: #1f2937;
            --surface-muted: #111827;
            --text-primary: #f3f4f6;
            --text-muted: #cbd5e1;
            --border-color: #374151;
            --accent: #4f46e5;
            --accent-hover: #4338ca;
            --surface-border: #374151;
            --card-shadow: 0 8px 24px rgba(0,0,0,0.35);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Nunito', 'Quicksand', sans-serif;
            background: var(--bg-gradient);
            display: flex; justify-content: center; align-items: center; min-height: 100vh;
            color: var(--text-primary);
            transition: background-color 0.3s ease, color 0.3s ease;
            padding: 16px;
        }

        .page-shell {
            width: 95%;
            max-width: 900px;
        }

        .page-actions {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            margin-bottom: 12px;
        }

        .translator-card {
            width: 100%; background: var(--surface-bg);
            border-radius: 14px; box-shadow: var(--card-shadow);
            overflow: hidden;
            transition: background-color 0.3s ease;
            border: 1px solid var(--surface-border);
        }

        .header-container {
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .header-title {
            text-align: center;
        }

        .back-btn {
            padding: 10px 14px;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            transition: background 0.2s ease, transform 0.2s ease, box-shadow 0.2s ease;
        }

        .back-btn:hover {
            background: var(--accent-hover);
            transform: translateY(-1px);
            box-shadow: 0 8px 18px rgba(102, 126, 234, 0.3);
        }

        .theme-toggle-btn {
            padding: 10px 16px;
            border: none;
            border-radius: 8px;
            background: var(--accent);
            color: #fff;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s ease, transform 0.2s ease, box-shadow 0.2s ease;
        }

        .theme-toggle-btn:hover {
            background: var(--accent-hover);
            transform: translateY(-1px);
            box-shadow: 0 8px 18px rgba(102, 126, 234, 0.3);
        }

        .app-header {
            background: linear-gradient(135deg, var(--accent), var(--accent-hover));
            color: white; padding: 22px; text-align: center;
        }

        .main-layout { padding: 22px; }

        .lang-selectors {
            display: flex; align-items: center; justify-content: space-between;
            margin-bottom: 20px; gap: 10px;
        }

        select {
            flex: 1; padding: 11px 12px; border: 1px solid var(--border-color);
            border-radius: 8px; font-size: 1rem; cursor: pointer;
            background-color: var(--surface-bg);
            color: var(--text-primary);
            transition: background-color 0.3s ease, color 0.3s ease, border-color 0.3s ease;
        }

        select:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.12);
        }

        .swap-icon {
            font-size: 1.5rem; cursor: pointer; color: var(--accent);
            transition: 0.3s; padding: 10px;
        }

        .swap-icon:hover { transform: rotate(180deg); }

        .text-areas {
            display: grid; grid-template-columns: 1fr 1fr; gap: 20px;
        }

        textarea {
            width: 100%; height: 200px; padding: 16px;
            border: 1px solid var(--border-color); border-radius: 12px;
            font-size: 1rem; resize: none; outline: none;
            line-height: 1.6;
            background-color: var(--surface-muted);
            color: var(--text-primary);
            transition: background-color 0.3s ease, color 0.3s ease, border-color 0.3s ease;
        }

        textarea:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1); }

        textarea[readonly] {
            opacity: 0.8;
        }

        .loader {
            height: 4px; width: 100%; background: var(--border-color);
            position: relative; overflow: hidden; display: none;
        }

        .voice-controls {
            margin-top: 14px;
            display: flex;
            align-items: center;
            gap: 12px;
            justify-content: flex-start;
            flex-wrap: wrap;
        }

        .voice-btn {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            border: 1px solid var(--border-color);
            background: var(--surface-bg);
            color: var(--text-primary);
            cursor: pointer;
            font-size: 18px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.2s ease, background-color 0.2s ease, border-color 0.2s ease;
        }

        .voice-icon {
            width: 20px;
            height: 20px;
            display: block;
        }

        .voice-icon path,
        .voice-icon line {
            stroke: currentColor;
            stroke-width: 1.8;
            fill: none;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .voice-btn:hover {
            transform: translateY(-1px);
            border-color: var(--accent);
        }

        .voice-btn.recording {
            background: #dc2626;
            border-color: #dc2626;
            color: #ffffff;
            animation: pulse 1.2s ease infinite;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(220, 38, 38, 0.5); }
            70% { box-shadow: 0 0 0 10px rgba(220, 38, 38, 0); }
            100% { box-shadow: 0 0 0 0 rgba(220, 38, 38, 0); }
        }

        .voice-status {
            font-size: 0.95rem;
            color: var(--text-muted);
        }

        .loader::after {
            content: ''; position: absolute; left: -50%;
            height: 100%; width: 50%; background: var(--accent);
            animation: loading 1.5s infinite linear;
        }

        @keyframes loading {
            0% { left: -50%; } 100% { left: 100%; }
        }

        @media (max-width: 600px) {
            .text-areas { grid-template-columns: 1fr; }
            .page-actions {
                justify-content: center;
            }

            .main-layout {
                padding: 16px;
            }

            .header-title h1 {
                font-size: 1.45rem;
            }
        }
    </style>
</head>
<body>

    <div class="page-shell">
        <div class="page-actions">
            <button class="theme-toggle-btn" onclick="toggleTheme()">Dark</button>
            <button class="back-btn" onclick="goBackToDashboard()">Back to Dashboard</button>
        </div>

        <div class="translator-card">
        <div class="app-header">
            <div class="header-container">
                <div class="header-title">
                    <h1>Travelator Translator</h1>
                    <p>Hindi • English • Spanish • French • German • Italian • Russian</p>
                </div>
            </div>
        </div>
        
        <div class="loader" id="loader"></div>

        <div class="main-layout">
            <div class="lang-selectors">
                <select id="sourceLang">
                    <option value="hi" selected>Hindi (हिन्दी)</option>
                    <option value="en">English</option>
                    <option value="es">Spanish (Español)</option>
                    <option value="fr">French (Français)</option>
                    <option value="de">German (Deutsch)</option>
                    <option value="it">Italian (Italiano)</option>
                    <option value="ru">Russian (Русский)</option>
                </select>

                <div class="swap-icon" onclick="swapLanguages()">⇄</div>

                <select id="targetLang">
                    <option value="en" selected>English</option>
                    <option value="es">Spanish (Español)</option>
                    <option value="fr">French (Français)</option>
                    <option value="hi">Hindi (हिन्दी)</option>
                    <option value="de">German (Deutsch)</option>
                    <option value="it">Italian (Italiano)</option>
                    <option value="ru">Russian (Русский)</option>
                </select>
            </div>

            <div class="text-areas">
                <textarea id="sourceText" placeholder="Enter text here..."></textarea>
                <textarea id="targetText" placeholder="Translation..." readonly></textarea>
            </div>

            <div class="voice-controls">
                <button id="voiceBtn" class="voice-btn" type="button" aria-label="Start voice input" title="Voice Input">
                    <svg class="voice-icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
                        <rect x="8" y="3" width="8" height="12" rx="4" ry="4"></rect>
                        <path d="M5 11a7 7 0 0 0 14 0"></path>
                        <line x1="12" y1="18" x2="12" y2="21"></line>
                        <line x1="9" y1="21" x2="15" y2="21"></line>
                    </svg>
                </button>
                <span id="voiceStatus" class="voice-status">Voice input ready.</span>
            </div>

            <div style="margin-top: 15px; display: flex; justify-content: center;">
                <button class="back-btn" style="background: #34a853;" onclick="performTranslation()">Translate Now</button>
            </div>
        </div>
    </div>
    </div>

    <script>
        window.TRAVELATOR_API_BASE_URL =
            window.TRAVELATOR_API_BASE_URL ||
            localStorage.getItem('travelator_api_base') ||
            '';
    </script>
    <script src="js/api-config.js"></script>
    <script src="js/translations.js"></script>
    <script>
        const sourceText = document.getElementById('sourceText');
        const targetText = document.getElementById('targetText');
        const sourceLang = document.getElementById('sourceLang');
        const targetLang = document.getElementById('targetLang');
        const loader = document.getElementById('loader');
        const voiceBtn = document.getElementById('voiceBtn');
        const voiceStatus = document.getElementById('voiceStatus');

        const SpeechRecognitionCtor = window.SpeechRecognition || window.webkitSpeechRecognition;
        const recognitionLanguageMap = {
            hi: 'hi-IN',
            en: 'en-US',
            es: 'es-ES',
            fr: 'fr-FR',
            de: 'de-DE',
            it: 'it-IT',
            ru: 'ru-RU',
        };
        let recognition;
        let isListening = false;
        let lastFinalTranscript = '';

        let debounceTimer;

        // Listen for typing with a debounce (waits for user to stop typing)
        sourceText.addEventListener('input', () => {
            clearTimeout(debounceTimer);
            debounceTimer = setTimeout(performTranslation, 800);
        });

        function getRecognitionLanguage() {
            return recognitionLanguageMap[sourceLang.value] || 'en-US';
        }

        function setVoiceStatus(message) {
            voiceStatus.textContent = message;
        }

        function toggleVoiceButton(recording) {
            voiceBtn.classList.toggle('recording', recording);
            voiceBtn.setAttribute('aria-label', recording ? 'Stop voice input' : 'Start voice input');
            voiceBtn.title = recording ? 'Stop Voice Input' : 'Voice Input';
        }

        function initSpeechRecognition() {
            if (!SpeechRecognitionCtor) {
                voiceBtn.disabled = true;
                setVoiceStatus('Voice input is not supported in this browser. Try Chrome or Edge.');
                return;
            }

            recognition = new SpeechRecognitionCtor();
            recognition.continuous = false;
            recognition.interimResults = true;
            recognition.maxAlternatives = 1;
            recognition.lang = getRecognitionLanguage();

            recognition.onstart = () => {
                isListening = true;
                toggleVoiceButton(true);
                setVoiceStatus(`Listening in ${recognition.lang}...`);
            };

            recognition.onresult = (event) => {
                let interimTranscript = '';
                for (let i = event.resultIndex; i < event.results.length; i += 1) {
                    const transcript = event.results[i][0].transcript;
                    if (event.results[i].isFinal) {
                        lastFinalTranscript += `${transcript} `;
                    } else {
                        interimTranscript += transcript;
                    }
                }

                sourceText.value = `${lastFinalTranscript}${interimTranscript}`.trim();
            };

            recognition.onerror = (event) => {
                const messageByError = {
                    'not-allowed': 'Microphone access blocked. Enable mic permission and try again.',
                    'service-not-allowed': 'Microphone permission denied by browser settings.',
                    'audio-capture': 'No microphone detected. Connect a mic and try again.',
                    'no-speech': 'No speech detected. Try speaking a bit louder.',
                    'language-not-supported': `Speech recognition does not support ${recognition.lang}.`,
                    network: 'Speech recognition network error. Check connection and retry.',
                };

                setVoiceStatus(messageByError[event.error] || 'Voice input failed. Please try again.');
            };

            recognition.onend = () => {
                isListening = false;
                toggleVoiceButton(false);

                const finalText = sourceText.value.trim();
                if (finalText) {
                    setVoiceStatus('Voice input complete. Translating...');
                    performTranslation();
                } else {
                    setVoiceStatus('Voice input stopped.');
                }
            };
        }

        async function startVoiceInput() {
            if (!recognition) {
                initSpeechRecognition();
            }

            if (!recognition) {
                return;
            }

            if (isListening) {
                recognition.stop();
                return;
            }

            recognition.lang = getRecognitionLanguage();
            lastFinalTranscript = '';

            try {
                if (navigator.permissions && navigator.permissions.query) {
                    const permission = await navigator.permissions.query({ name: 'microphone' });
                    if (permission.state === 'denied') {
                        setVoiceStatus('Microphone permission is blocked. Allow it in browser settings.');
                        return;
                    }
                }
            } catch (error) {
                // Ignore permission query failures and rely on recognition errors.
            }

            try {
                recognition.start();
            } catch (error) {
                setVoiceStatus('Unable to start voice input. Try again in a moment.');
            }
        }

        voiceBtn.addEventListener('click', startVoiceInput);
        sourceLang.addEventListener('change', () => {
            if (recognition) {
                recognition.lang = getRecognitionLanguage();
            }
            setVoiceStatus(`Voice language set to ${getRecognitionLanguage()}.`);
        });

        async function performTranslation() {
            const text = sourceText.value.trim();
            if (!text) {
                targetText.value = '';
                return;
            }

            loader.style.display = 'block';

            try {
                if (typeof translatorAPI !== 'undefined' && translatorAPI.translate) {
                    const translatedText = await translatorAPI.translate(text, sourceLang.value, targetLang.value);
                    targetText.value = translatedText || 'No translation returned.';
                    return;
                }

                targetText.value = 'Translator service is not available.';
            } catch (err) {
                console.warn('Translation failed.', err);
                targetText.value = 'Translation failed. Please check your API key/region and network.';
            } finally {
                loader.style.display = 'none';
            }
        }

        function swapLanguages() {
            const tempLang = sourceLang.value;
            sourceLang.value = targetLang.value;
            targetLang.value = tempLang;

            const tempText = sourceText.value;
            sourceText.value = targetText.value;
            targetText.value = tempText;

            performTranslation();
        }

        function goBackToDashboard() {
            window.location.href = 'dashboard.html';
        }

        function toggleTheme() {
            const body = document.body;
            const themeBtn = document.querySelector('.theme-toggle-btn');
            
            body.classList.toggle('dark');
            
            // Save preference
            localStorage.setItem('theme', body.classList.contains('dark') ? 'dark' : 'light');
            
            // Update button text
            themeBtn.textContent = body.classList.contains('dark') ? 'Light' : 'Dark';
        }

        // Load saved theme preference on page load
        window.addEventListener('DOMContentLoaded', () => {
            const savedTheme = localStorage.getItem('theme');
            const body = document.body;
            const themeBtn = document.querySelector('.theme-toggle-btn');

            initSpeechRecognition();
            
            if (savedTheme === 'dark') {
                body.classList.add('dark');
                themeBtn.textContent = 'Light';
            }
        });
    </script>
</body>
</html>
