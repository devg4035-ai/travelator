<svg width="120" height="120" viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="hotelGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Outer Circle Background -->
  <circle cx="60" cy="60" r="60" fill="#0f172a" opacity="0.8"/>
  
  <!-- Gradient Border Circle -->
  <circle cx="60" cy="60" r="55" fill="none" stroke="url(#hotelGradient)" stroke-width="2" opacity="0.6" filter="url(#glow)"/>
  
  <!-- Building/Hotel Icon -->
  <g transform="translate(60, 60)">
    <!-- Building base -->
    <rect x="-28" y="-15" width="56" height="40" fill="#667eea" rx="4"/>
    
    <!-- Door -->
    <rect x="-8" y="10" width="16" height="15" fill="#764ba2" rx="2"/>
    
    <!-- Windows row 1 -->
    <rect x="-24" y="-8" width="8" height="8" fill="#c7d2fe" rx="1"/>
    <rect x="-10" y="-8" width="8" height="8" fill="#c7d2fe" rx="1"/>
    <rect x="4" y="-8" width="8" height="8" fill="#c7d2fe" rx="1"/>
    <rect x="18" y="-8" width="8" height="8" fill="#c7d2fe" rx="1"/>
    
    <!-- Windows row 2 -->
    <rect x="-24" y="2" width="8" height="8" fill="#c7d2fe" rx="1"/>
    <rect x="4" y="2" width="8" height="8" fill="#c7d2fe" rx="1"/>
    <rect x="18" y="2" width="8" height="8" fill="#c7d2fe" rx="1"/>
    
    <!-- Roof -->
    <polygon points="-30,−15 0,-30 30,-15" fill="#764ba2" opacity="0.9"/>
    <path d="M -30 -15 L 0 -30 L 30 -15" stroke="#667eea" stroke-width="1" fill="none"/>
  </g>
</svg>