<svg width="120" height="120" viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="flightGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
    <filter id="flightGlow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Outer Circle Background -->
  <circle cx="60" cy="60" r="60" fill="#0f172a" opacity="0.8"/>
  
  <!-- Gradient Border Circle -->
  <circle cx="60" cy="60" r="55" fill="none" stroke="url(#flightGradient)" stroke-width="2" opacity="0.6" filter="url(#flightGlow)"/>
  
  <!-- Airplane Icon -->
  <g transform="translate(60, 60) scale(1.4)">
    <!-- Fuselage (body) -->
    <ellipse cx="0" cy="0" rx="6" ry="18" fill="#667eea"/>
    
    <!-- Cockpit (nose) -->
    <circle cx="0" cy="-16" r="5" fill="#764ba2"/>
    
    <!-- Left Wing -->
    <path d="M -6 -2 L -28 2 L -24 4 L -6 2 Z" fill="#667eea"/>
    <rect x="-26" y="1" width="20" height="2" fill="#c7d2fe" opacity="0.7"/>
    
    <!-- Right Wing -->
    <path d="M 6 -2 L 28 2 L 24 4 L 6 2 Z" fill="#667eea"/>
    <rect x="6" y="1" width="20" height="2" fill="#c7d2fe" opacity="0.7"/>
    
    <!-- Tail Wing (vertical) -->
    <rect x="-4" y="12" width="8" height="10" fill="#764ba2" rx="2"/>
    
    <!-- Windows -->
    <circle cx="0" cy="-8" r="2" fill="#c7d2fe"/>
    <circle cx="0" cy="-2" r="2" fill="#c7d2fe"/>
    
    <!-- Landing gear indicator -->
    <circle cx="-3" cy="18" r="1.5" fill="#c7d2fe"/>
    <circle cx="3" cy="18" r="1.5" fill="#c7d2fe"/>
  </g>
</svg>